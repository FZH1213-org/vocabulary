<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .upload-container {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .upload-title {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-area.drag-over {
            border-color: #667eea;
            background: #f0f3ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .upload-text {
            color: #666;
            font-size: 14px;
        }

        .upload-text span {
            color: #667eea;
            font-weight: 600;
        }

        .file-input {
            display: none;
        }

        .file-list {
            margin-top: 20px;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .file-name {
            flex: 1;
            font-size: 14px;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .file-status.uploading {
            background: #e3f2fd;
            color: #1976d2;
        }

        .file-status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .file-status.error {
            background: #ffebee;
            color: #d32f2f;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .result-url {
            margin-top: 8px;
            font-size: 12px;
            color: #667eea;
            word-break: break-all;
        }

        .btn-upload {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-upload:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .token-status {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 16px;
        }

        .token-status.ready {
            color: #388e3c;
        }

        .token-status.error {
            color: #d32f2f;
        }
    </style>
</head>

<body>
    <div class="upload-container">
        <h1 class="upload-title">文件上传</h1>

        <div class="token-status" id="tokenStatus">正在获取上传凭证...</div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">拖拽文件到此处，或 <span>点击选择</span></div>
            <input type="file" class="file-input" id="fileInput" multiple>
        </div>

        <div class="file-list" id="fileList"></div>
    </div>

    <script>
        // 七牛上传相关配置
        const QINIU_UPLOAD_URL = 'https://upload-z2.qiniup.com';
        const TOKEN_API = 'https://taier-stg.datousoft.com/basic/qiniu/token';

        let uploadToken = null;

        // 获取上传 token
        async function fetchToken() {
            const tokenStatus = document.getElementById('tokenStatus');
            try {
                const response = await fetch(TOKEN_API);
                const result = await response.json();

                if (result.code === 0 || result.data) {
                    uploadToken = result.data || result.token || result;
                    tokenStatus.textContent = '✓ 上传凭证已就绪';
                    tokenStatus.className = 'token-status ready';
                } else {
                    throw new Error(result.message || '获取 token 失败');
                }
            } catch (error) {
                console.error('获取 token 失败:', error);
                tokenStatus.textContent = '✗ 获取上传凭证失败，请刷新页面重试';
                tokenStatus.className = 'token-status error';
            }
        }

        // 生成文件 key
        function generateKey() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const dateStr = `${year}${month}${day}`;
            return `frent_${dateStr}_mini_`; // 可在front前加前缀如reserve/f25a53/
        }

        // 上传文件到七牛
        async function uploadFile(file) {
            if (!uploadToken) {
                alert('上传凭证未就绪，请稍后重试');
                return;
            }

            const key = generateKey() + file.name;
            const formData = new FormData();
            formData.append('token', uploadToken);
            formData.append('key', key);
            formData.append('file', file);

            // 创建文件项显示
            const fileList = document.getElementById('fileList');
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            fileItem.innerHTML = `
        <div class="file-name">${file.name}</div>
        <div class="file-status uploading">上传中</div>
        <div class="progress-bar" style="display:none">
          <div class="progress-fill" style="width: 0%"></div>
        </div>
        <div class="result-url" style="display:none"></div>
      `;
            fileList.appendChild(fileItem);

            const statusEl = fileItem.querySelector('.file-status');
            const progressEl = fileItem.querySelector('.progress-bar');
            const progressFill = fileItem.querySelector('.progress-fill');
            const resultUrl = fileItem.querySelector('.result-url');

            try {
                const xhr = new XMLHttpRequest();

                await new Promise((resolve, reject) => {
                    xhr.upload.addEventListener('progress', (e) => {
                        if (e.lengthComputable) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            progressEl.style.display = 'block';
                            progressFill.style.width = percent + '%';
                        }
                    });

                    xhr.addEventListener('load', () => {
                        if (xhr.status === 200) {
                            resolve(JSON.parse(xhr.responseText));
                        } else {
                            reject(new Error(`上传失败: ${xhr.status}`));
                        }
                    });

                    xhr.addEventListener('error', () => reject(new Error('网络错误')));
                    xhr.addEventListener('abort', () => reject(new Error('上传取消')));

                    xhr.open('POST', QINIU_UPLOAD_URL);
                    xhr.send(formData);
                });

                const result = JSON.parse(xhr.responseText);
                statusEl.className = 'file-status success';
                statusEl.textContent = '上传成功';
                progressEl.style.display = 'none';

                // 显示上传后的 URL
                const fileUrl = `https://cdn.jmj1995.com/${result.key}`;
                resultUrl.style.display = 'block';
                resultUrl.innerHTML = `<a href="${fileUrl}" target="_blank">${fileUrl}</a>`;

                console.log('上传成功:', result);
            } catch (error) {
                console.error('上传失败:', error);
                statusEl.className = 'file-status error';
                statusEl.textContent = '上传失败';
                progressEl.style.display = 'none';
            }
        }

        // 初始化事件监听
        function initEvents() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');

            // 点击选择文件
            uploadArea.addEventListener('click', () => {
                fileInput.click();
            });

            // 文件选择变化
            fileInput.addEventListener('change', (e) => {
                const files = e.target.files;
                if (files.length > 0) {
                    Array.from(files).forEach(file => uploadFile(file));
                }
                fileInput.value = ''; // 清空，允许重复选择同一文件
            });

            // 拖拽上传
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('drag-over');
            });

            uploadArea.addEventListener('dragleave', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('drag-over');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('drag-over');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    Array.from(files).forEach(file => uploadFile(file));
                }
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            fetchToken();
            initEvents();
        });
    </script>
</body>

</html>
